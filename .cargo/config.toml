[build]
# Use rust-lld — much faster than the default MSVC linker
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[profile.dev]
# Disable debug info in dev builds — reduces artifact size significantly
debug = 0
# Compile dependencies with optimizations even in dev mode
opt-level = 0

[profile.dev.package."*"]
# All external crates (libp2p, secp256k1, etc.) compiled at opt-level 3
# This is cached after first build — subsequent builds are fast
opt-level = 3
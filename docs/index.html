<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Austro Explorer</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --accent: #f78166;
      --accent2: #79c0ff;
      --green: #56d364;
      --yellow: #e3b341;
      --text: #e6edf3;
      --muted: #8b949e;
      --font: 'Courier New', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .logo { font-size: 20px; font-weight: bold; color: var(--accent); letter-spacing: 2px; }
    .logo span { color: var(--text); }

    .search-bar {
      display: flex;
      gap: 8px;
      flex: 1;
      max-width: 600px;
    }
    .search-bar input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      font-family: var(--font);
      font-size: 13px;
      outline: none;
    }
    .search-bar input:focus { border-color: var(--accent2); }
    .search-bar button {
      background: var(--accent2);
      color: var(--bg);
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-family: var(--font);
    }
    .search-bar button:hover { opacity: 0.85; }

    .node-url {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }
    .node-url input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 8px;
      border-radius: 4px;
      font-family: var(--font);
      font-size: 12px;
      width: 220px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; }
    .dot.offline { background: var(--accent); }

    main { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .stat-card .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
    .stat-card .value { font-size: 22px; font-weight: bold; color: var(--accent2); margin-top: 6px; }

    .section-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 32px;
      font-size: 13px;
    }
    th {
      text-align: left;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    tr:hover td { background: rgba(255,255,255,0.03); }

    .hash {
      font-family: var(--font);
      color: var(--accent2);
      cursor: pointer;
      white-space: nowrap;
    }
    .hash:hover { text-decoration: underline; }
    .addr {
      font-family: var(--font);
      color: var(--yellow);
      cursor: pointer;
      word-break: break-all;
    }
    .addr:hover { text-decoration: underline; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
    }
    .badge-green { background: rgba(86,211,100,0.15); color: var(--green); }
    .badge-yellow { background: rgba(227,179,65,0.15); color: var(--yellow); }
    .badge-blue { background: rgba(121,192,255,0.15); color: var(--accent2); }
    .badge-red { background: rgba(247,129,102,0.15); color: var(--accent); }

    .detail-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 24px;
      display: none;
    }
    .detail-panel.active { display: block; }
    .detail-panel h3 { color: var(--accent); margin-bottom: 16px; font-size: 14px; }
    .kv { display: grid; grid-template-columns: 180px 1fr; gap: 8px 16px; margin-bottom: 6px; }
    .kv .k { color: var(--muted); font-size: 12px; }
    .kv .v { word-break: break-all; font-size: 12px; }

    .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
    .tab {
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: var(--font);
    }
    .tab.active { background: var(--accent2); color: var(--bg); border-color: var(--accent2); }

    .mempool-count {
      display: inline-block;
      background: var(--accent);
      color: var(--bg);
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 11px;
      font-weight: bold;
      margin-left: 6px;
    }

    .refresh-btn {
      float: right;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-family: var(--font);
    }
    .refresh-btn:hover { color: var(--text); border-color: var(--text); }

    .empty { color: var(--muted); text-align: center; padding: 32px; font-size: 13px; }

    #detail-section { }
  </style>
</head>
<body>

<header>
  <div class="logo">AUSTRO<span>EXPLORER</span></div>
  <div class="search-bar">
    <input id="search-input" type="text" placeholder="Search block hash, tx id, or address..." />
    <button onclick="search()">Search</button>
  </div>
  <div class="node-url">
    <span id="status-dot" class="dot offline"></span>
    <span>Node:</span>
    <input id="node-url" type="text" value="http://localhost:3000" onchange="setNode(this.value)" />
  </div>
</header>

<main>

  <!-- Stats -->
  <div class="stats" id="stats">
    <div class="stat-card"><div class="label">Height</div><div class="value" id="s-height">—</div></div>
    <div class="stat-card"><div class="label">Difficulty</div><div class="value" id="s-diff">—</div></div>
    <div class="stat-card"><div class="label">Total Supply</div><div class="value" id="s-supply">—</div></div>
    <div class="stat-card"><div class="label">Pending TXs</div><div class="value" id="s-pending">—</div></div>
    <div class="stat-card"><div class="label">Chain Valid</div><div class="value" id="s-valid">—</div></div>
  </div>

  <!-- Detail panel (block / tx / address) -->
  <div id="detail-section">
    <div id="detail-block" class="detail-panel">
      <h3>⬛ Block Detail</h3>
      <div id="detail-block-content"></div>
    </div>
    <div id="detail-tx" class="detail-panel">
      <h3>↔ Transaction Detail</h3>
      <div id="detail-tx-content"></div>
    </div>
    <div id="detail-addr" class="detail-panel">
      <h3>◎ Address Detail</h3>
      <div id="detail-addr-content"></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('blocks')">Blocks</button>
    <button class="tab" onclick="showTab('mempool')">
      Mempool<span class="mempool-count" id="mempool-badge">0</span>
    </button>
  </div>

  <!-- Blocks table -->
  <div id="tab-blocks">
    <div class="section-title">
      Latest Blocks
      <button class="refresh-btn" onclick="loadChain()">↻ Refresh</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>Height</th>
          <th>Hash</th>
          <th>Miner</th>
          <th>TXs</th>
          <th>Reward</th>
          <th>Difficulty</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody id="blocks-body"></tbody>
    </table>
  </div>

  <!-- Mempool table -->
  <div id="tab-mempool" style="display:none">
    <div class="section-title">
      Pending Transactions
      <button class="refresh-btn" onclick="loadMempool()">↻ Refresh</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>TX ID</th>
          <th>Inputs</th>
          <th>Outputs</th>
          <th>Fee</th>
        </tr>
      </thead>
      <tbody id="mempool-body"></tbody>
    </table>
  </div>

</main>

<script>
  let NODE = localStorage.getItem('austro_node') || 'http://localhost:3000';
  document.getElementById('node-url').value = NODE;

  function setNode(url) {
    NODE = url.replace(/\/$/, '');
    localStorage.setItem('austro_node', NODE);
    loadAll();
  }

  function api(path) {
    return fetch(NODE + '/api' + path).then(r => r.json());
  }

  function ts(unix) {
    if (!unix) return '—';
    const d = new Date(unix * 1000);
    return d.toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
  }

  function shortHash(h) {
    if (!h || h.length < 16) return h;
    return h.slice(0, 8) + '…' + h.slice(-8);
  }

  async function loadInfo() {
    try {
      const info = await api('/info');
      document.getElementById('s-height').textContent = info.height;
      document.getElementById('s-diff').textContent = info.difficulty;
      document.getElementById('s-supply').textContent = info.total_supply + ' ₳';
      document.getElementById('s-pending').textContent = info.pending_txs;
      document.getElementById('s-valid').innerHTML = info.is_valid
        ? '<span class="badge badge-green">✓ Valid</span>'
        : '<span class="badge badge-red">✗ Invalid</span>';
      document.getElementById('mempool-badge').textContent = info.pending_txs;
      document.getElementById('status-dot').className = 'dot';
    } catch {
      document.getElementById('status-dot').className = 'dot offline';
    }
  }

  async function loadChain() {
    const blocks = await api('/chain').catch(() => []);
    const tbody = document.getElementById('blocks-body');
    if (!blocks.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty">No blocks yet</td></tr>';
      return;
    }
    tbody.innerHTML = blocks.map(b => `
      <tr>
        <td><span class="badge badge-blue">${b.index}</span></td>
        <td><span class="hash" onclick="showBlock('${b.hash}')">${shortHash(b.hash)}</span></td>
        <td><span class="addr" onclick="showAddress('${b.miner}')">${shortHash(b.miner)}</span></td>
        <td>${b.tx_count}</td>
        <td><span class="badge badge-green">+${b.reward} ₳</span></td>
        <td>${b.difficulty}</td>
        <td style="color:var(--muted);font-size:12px">${ts(b.timestamp)}</td>
      </tr>
    `).join('');
  }

  async function loadMempool() {
    const mp = await api('/mempool').catch(() => ({ transactions: [] }));
    const tbody = document.getElementById('mempool-body');
    if (!mp.transactions.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="empty">Mempool is empty</td></tr>';
      return;
    }
    tbody.innerHTML = mp.transactions.map(tx => `
      <tr>
        <td><span class="hash" onclick="showTx('${tx.id}')">${shortHash(tx.id)}</span></td>
        <td>${tx.inputs.length}</td>
        <td>${tx.outputs.map(o => `<span class="addr" onclick="showAddress('${o.address}')">${shortHash(o.address)}</span> <span style="color:var(--green)">${o.value} ₳</span>`).join('<br>')}</td>
        <td><span class="badge badge-yellow">${tx.fee} ₳</span></td>
      </tr>
    `).join('');
  }

  async function showBlock(hash) {
    hideAllDetails();
    const b = await api('/block/' + hash).catch(() => null);
    if (!b) return;
    const panel = document.getElementById('detail-block');
    panel.classList.add('active');
    document.getElementById('detail-block-content').innerHTML = `
      <div class="kv"><span class="k">Height</span><span class="v">${b.index}</span></div>
      <div class="kv"><span class="k">Hash</span><span class="v" style="color:var(--accent2)">${b.hash}</span></div>
      <div class="kv"><span class="k">Previous Hash</span><span class="v"><span class="hash" onclick="showBlock('${b.previous_hash}')">${b.previous_hash}</span></span></div>
      <div class="kv"><span class="k">Timestamp</span><span class="v">${ts(b.timestamp)}</span></div>
      <div class="kv"><span class="k">Nonce</span><span class="v">${b.nonce}</span></div>
      <div class="kv"><span class="k">Difficulty</span><span class="v">${b.difficulty} leading zeros</span></div>
      <div class="kv"><span class="k">Reward</span><span class="v">${b.reward} AUSTRO</span></div>
      <div class="kv"><span class="k">Miner</span><span class="v"><span class="addr" onclick="showAddress('${b.miner}')">${b.miner}</span></span></div>
      <br>
      <div class="section-title">Transactions (${b.tx_count})</div>
      ${b.transactions.map(tx => `
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:8px">
          <div style="margin-bottom:6px">
            <span class="hash" onclick="showTx('${tx.id}')">${shortHash(tx.id)}</span>
            ${tx.is_coinbase ? '<span class="badge badge-yellow" style="margin-left:8px">COINBASE</span>' : ''}
          </div>
          <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;font-size:12px">
            <div>${tx.is_coinbase ? '<span style="color:var(--muted)">— coinbase —</span>' : tx.inputs.map(i => `<span style="color:var(--muted)">${shortHash(i.tx_id)}:${i.out_index}</span>`).join('<br>')}</div>
            <div style="color:var(--muted)">→</div>
            <div>${tx.outputs.map(o => `<span class="addr" onclick="showAddress('${o.address}')">${shortHash(o.address)}</span> <span style="color:var(--green)">${o.value} ₳</span>`).join('<br>')}</div>
          </div>
        </div>
      `).join('')}
    `;
    panel.scrollIntoView({ behavior: 'smooth' });
  }

  async function showTx(id) {
    hideAllDetails();
    const tx = await api('/tx/' + id).catch(() => null);
    if (!tx) return;
    const panel = document.getElementById('detail-tx');
    panel.classList.add('active');
    document.getElementById('detail-tx-content').innerHTML = `
      <div class="kv"><span class="k">TX ID</span><span class="v" style="color:var(--accent2)">${tx.id}</span></div>
      <div class="kv"><span class="k">Type</span><span class="v">${tx.is_coinbase ? '<span class="badge badge-yellow">COINBASE</span>' : '<span class="badge badge-blue">TRANSFER</span>'}</span></div>
      <div class="kv"><span class="k">Fee</span><span class="v">${tx.fee} AUSTRO</span></div>
      <br>
      <div style="display:grid;grid-template-columns:1fr 40px 1fr;gap:16px">
        <div>
          <div class="section-title">Inputs (${tx.inputs.length})</div>
          ${tx.is_coinbase
            ? '<div style="color:var(--muted);font-size:12px">— newly generated coins —</div>'
            : tx.inputs.map(i => `<div style="font-size:12px;margin-bottom:4px;color:var(--muted)">${shortHash(i.tx_id)}:${i.out_index}</div>`).join('')}
        </div>
        <div style="display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:20px">→</div>
        <div>
          <div class="section-title">Outputs (${tx.outputs.length})</div>
          ${tx.outputs.map(o => `
            <div style="font-size:12px;margin-bottom:6px">
              <span class="addr" onclick="showAddress('${o.address}')">${shortHash(o.address)}</span><br>
              <span style="color:var(--green)">${o.value} AUSTRO</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
    panel.scrollIntoView({ behavior: 'smooth' });
  }

  async function showAddress(addr) {
    hideAllDetails();
    const info = await api('/address/' + addr).catch(() => null);
    if (!info) return;
    const panel = document.getElementById('detail-addr');
    panel.classList.add('active');
    document.getElementById('detail-addr-content').innerHTML = `
      <div class="kv"><span class="k">Address</span><span class="v" style="color:var(--yellow);word-break:break-all">${info.address}</span></div>
      <div class="kv"><span class="k">Balance</span><span class="v"><span class="badge badge-green">${info.balance} AUSTRO</span></span></div>
      <div class="kv"><span class="k">Transactions</span><span class="v">${info.tx_count}</span></div>
      <br>
      <div class="section-title">Transaction History</div>
      ${!info.transactions.length
        ? '<div class="empty">No transactions</div>'
        : `<table>
            <thead><tr><th>TX ID</th><th>Block</th><th>Confirmations</th><th>Amount</th><th>Fee</th><th>Dir</th></tr></thead>
            <tbody>
            ${info.transactions.map(r => `
              <tr>
                <td><span class="hash" onclick="showTx('${r.tx_id}')">${shortHash(r.tx_id)}</span></td>
                <td>${r.block}</td>
                <td>${r.confirmations}</td>
                <td style="color:${r.net >= 0 ? 'var(--green)' : 'var(--accent)'}">${r.net >= 0 ? '+' : ''}${r.net} ₳</td>
                <td>${r.fee}</td>
                <td><span class="badge ${r.direction === 'in' ? 'badge-green' : r.direction === 'out' ? 'badge-red' : 'badge-yellow'}">${r.direction.toUpperCase()}</span></td>
              </tr>
            `).join('')}
            </tbody>
          </table>`
      }
    `;
    panel.scrollIntoView({ behavior: 'smooth' });
  }

  function hideAllDetails() {
    document.querySelectorAll('.detail-panel').forEach(p => p.classList.remove('active'));
  }

  function showTab(tab) {
    document.getElementById('tab-blocks').style.display = tab === 'blocks' ? '' : 'none';
    document.getElementById('tab-mempool').style.display = tab === 'mempool' ? '' : 'none';
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'blocks') || (i === 1 && tab === 'mempool'));
    });
    if (tab === 'mempool') loadMempool();
  }

  async function search() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;

    if (/^[0-9a-f]{64}$/i.test(q)) {
      const block = await api('/block/' + q).catch(() => null);
      if (block && !block.error) { showBlock(q); return; }
      const tx = await api('/tx/' + q).catch(() => null);
      if (tx && !tx.error) { showTx(q); return; }
      showAddress(q);
      return;
    }

    if (/^\d+$/.test(q)) {
      const block = await api('/block/height/' + q).catch(() => null);
      if (block && !block.error) { showBlock(block.hash); return; }
    }

    alert('Not found: ' + q);
  }

  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') search();
  });

  function loadAll() {
    loadInfo();
    loadChain();
  }

  // Auto-refresh every 5s
  loadAll();
  setInterval(loadAll, 5000);
</script>

</body>
</html>
